name: suite modulos
on: 
   push:
       branches: 
         - main
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
          - name: checkout de codigo
            uses: actions/checkout@v4
          - name: docker login
            uses: docker/login-action@v3
            with:
              username: ${{secrets.DOKERHUB_USER}}
              password: ${{secrets.DOCKERHUB_PASSWORD}}
          - name: build e push de imagem
            run: |
              docker build -t elivandrolopes/front-portaria:8.0 .
              docker push elivandrolopes/front-portaria:8.0
    deploy:
      needs: build
      runs-on: [self-hosted,linux]
      steps:
        - name: deploy local no docker compose
          run: |
            cd /servidor/servidor
            docker compose pull portaria-front
            docker compose up -d portaria-front
        